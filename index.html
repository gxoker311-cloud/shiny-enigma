<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gxoker UBT Elite V45 - Grammar Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Montserrat:wght@500;700&family=Pyidaungsu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #38bdf8; 
            --gold: #fbbf24;
            --dark-bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --danger: #f43f5e;
            --success: #10b981;
            --rgb-border: linear-gradient(90deg, #38bdf8, #fbbf24, #f43f5e, #38bdf8);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Montserrat', 'Pyidaungsu', sans-serif; }
        body { margin: 0; background: var(--dark-bg); color: #f8fafc; overflow: hidden; display: flex; flex-direction: column; height: 100dvh; }

        /* ⚡ Header & Navigation */
        .header { display: flex; align-items: center; background: #020617; height: 55px; padding: 0 15px; position: relative; border-bottom: 1px solid #1e293b; }
        .header::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: var(--rgb-border); background-size: 300%; animation: move-border 10s linear infinite; }
        .brand { font-family: 'Orbitron'; font-weight: 900; color: var(--gold); font-size: 13px; letter-spacing: 1px; }
        .timer-box { margin-left: auto; font-family: 'Orbitron'; font-size: 16px; color: var(--accent); }

        .progress-container { height: 4px; background: #334155; width: 100%; }
        .progress-bar { height: 100%; background: var(--accent); width: 0%; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 10px var(--accent); }

        /* 📱 Main Layout */
        .wrapper { display: flex; flex: 1; overflow: hidden; padding: 12px; gap: 12px; }
        .q-container { flex: 1.2; background: var(--card-bg); backdrop-filter: blur(10px); border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); padding: 20px; overflow-y: auto; }
        .q-meta { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .q-num { background: var(--accent); color: #000; padding: 3px 10px; border-radius: 6px; font-weight: 900; font-size: 10px; font-family: 'Orbitron'; }
        .q-text { font-size: 15px; line-height: 1.7; font-weight: 700; color: #e2e8f0; }

        .a-container { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .opt { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 14px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; transition: 0.2s; font-size: 14px; }
        .opt:active { transform: scale(0.98); }
        .opt.selected { background: rgba(56, 189, 248, 0.15); border-color: var(--accent); color: var(--accent); }
        .opt-idx { width: 22px; height: 22px; border: 1px solid currentColor; border-radius: 6px; display: flex; align-items: center; justify-content: center; margin-right: 12px; font-size: 10px; font-weight: 900; }

        /* 🔘 Footer Buttons */
        .footer { display: flex; height: 70px; background: #020617; padding: 12px; gap: 12px; border-top: 1px solid #1e293b; }
        .btn { flex: 1; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; font-size: 12px; color: #fff; transition: 0.3s; }
        .btn-p { background: #334155; }
        .btn-n { background: var(--accent); color: #000; }
        .btn-s { background: var(--danger); flex: 1.5; box-shadow: 0 4px 15px rgba(244, 63, 94, 0.3); }

        /* 🏁 Results Screen */
        #results { position: fixed; inset: 0; background: var(--dark-bg); z-index: 1000; display: none; flex-direction: column; align-items: center; padding: 30px 15px; overflow-y: auto; }
        .score-box { width: 140px; height: 140px; border: 5px solid var(--accent); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 25px 0; background: rgba(56, 189, 248, 0.05); }
        .score-num { font-size: 45px; font-weight: 900; font-family: 'Orbitron'; color: var(--accent); }
        .review-card { background: #1e293b; border-radius: 12px; width: 100%; max-width: 480px; padding: 15px; margin-bottom: 10px; border-left: 5px solid #475569; }
        .correct { border-left-color: var(--success); }
        .wrong { border-left-color: var(--danger); }

        @keyframes move-border { 0% { background-position: 0% 50%; } 100% { background-position: 300% 50%; } }
        @media (max-width: 768px) { .wrapper { flex-direction: column; } .q-container { flex: none; height: 45%; } }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand">GXOKER စနစ်သစ်UBT SET-45</div>
        <div class="timer-box" id="timer">20:00</div>
    </div>
    <div class="progress-container"><div class="progress-bar" id="p-bar"></div></div>

    <div class="wrapper">
        <div class="q-container">
            <div class="q-meta"><span class="q-num" id="q-idx">Q 01</span></div>
            <div class="q-text" id="q-text">Loading...</div>
        </div>
        <div class="a-container" id="opt-box"></div>
    </div>

    <div class="footer">
        <button class="btn btn-p" onclick="nav(-1)">PREVIOUS</button>
        <button class="btn btn-n" onclick="nav(1)">NEXT</button>
        <button class="btn btn-s" onclick="submit()">SUBMIT EXAM</button>
    </div>

    <div id="results">
        <h2 style="font-family:'Orbitron'; color:var(--gold);">MISSION REPORT</h2>
        <div class="score-box">
            <span class="score-num" id="final-score">0</span>
            <span style="font-size:10px; font-weight:900; letter-spacing:1px;">POINTS</span>
        </div>
        <button class="btn btn-n" style="width:200px; height:50px; flex:none; margin-bottom:30px;" onclick="location.reload()">TRY AGAIN</button>
        <div id="review-list" style="width:100%; display:flex; flex-direction:column; align-items:center;"></div>
    </div>

<script>
    const examData = [
        { q: "1. 가: 리한 씨, 작업이 다 끝났어요?\n나: 아니요, 아직 ____. 10분만 더 기다려 주세요.", a: ["끝내는 중이에요", "끝낼 거예요", "끝내고 싶어요", "끝내기 위해서"], c: 0 },
        { q: "2. 작업장 바닥에 기름이 있어서 ____ 넘어질 뻔했습니다.", a: ["미끄러워서", "미끄러우니까", "미끄러우면", "미끄럽고"], c: 0 },
        { q: "3. 가: 투안 씨, 이 기계 어떻게 사용하는지 알아요?\n나: 아니요, 저도 잘 몰라요. 반장님께 ____ 보세요.", a: ["가르쳐", "물어", "도와", "빌려"], c: 1 },
        { q: "4. 고향에 있는 가족들에게 편지를 ____ 우체국에 가야 합니다.", a: ["보내려고", "보내서", "보내면", "보내니까"], c: 0 },
        { q: "5. 우리 공장은 토요일에도 일을 하지만 일요일에는 항상 ____.", a: ["일합니다", "쉽니다", "나갑니다", "배웁니다"], c: 1 },
        { q: "6. 가: 주말에 친구하고 같이 등산을 ____ 해요.\n나: 와, 좋겠네요. 조심히 다녀오세요.", a: ["가야", "가기로", "가니까", "가면서"], c: 1 },
        { q: "7. 날씨가 너무 ____ 에어컨을 켰습니다.", a: ["더워서", "추워서", "맑아서", "흐려서"], c: 0 },
        { q: "8. 가: 이 서류를 복사해야 하는데 어떻게 해요?\n나: 여기 복사기에 종이를 넣고 시작 버튼을 ____ 됩니다.", a: ["누르면", "누르고", "누르니까", "누르거나"], c: 0 },
        { q: "9. 공장에서 일할 때는 안전을 위해서 항상 보호구를 ____ 합니다.", a: ["착용해야", "착용하러", "착용하고", "착용하거나"], c: 0 },
        { q: "10. 가: 점심 먹으러 갈까요?\n나: 미안해요. 지금 일이 많아서 이것만 ____ 갈게요.", a: ["끝나고", "끝내고", "끝나면", "끝내면"], c: 1 },
        { q: "11. 어제는 월급날이었습니다. 그래서 통장에 ____ 돈을 확인했습니다.", a: ["들어온", "나간", "보낸", "빌린"], c: 0 },
        { q: "12. 가: 민수 씨, 내일 같이 영화 볼까요?\n나: 내일은 고향 친구를 ____ 약속이 있어요.", a: ["만나기로 한", "만나야 하는", "만날 것 같은", "만나려고 하는"], c: 0 },
        { q: "13. 버스나 지하철에서는 어르신들께 자리를 ____ 드려야 합니다.", a: ["양보해", "알려", "바꾸어", "빌려"], c: 0 },
        { q: "14. 가: 한국에 ____ 얼마나 됐어요?\n나: 6개월 됐어요.", a: ["온 지", "가 본 지", "산 지", "배우는 지"], c: 0 },
        { q: "15. 한국 사람들은 보통 명절에 고향에 ____ 가족들을 만납니다.", a: ["내려가서", "내려가니까", "내려가면", "내려가려고"], c: 0 },
        { q: "16. 가: 영수 씨, 어제 왜 회사에 안 왔어요?\n나: 몸이 너무 ____ 집에서 쉬었어요.", a: ["아파서", "좋아서", "바빠서", "늦어서"], c: 0 },
        { q: "17. 이 약은 식사 후에 ____ 드세요.", a: ["30분", "30번", "30살", "30권"], c: 0 },
        { q: "18. 가: 투안 씨는 요리를 잘해요?\n나: 아니요, 저는 요리를 잘 ____.", a: ["못해요", "안 해요", "해요", "싶어요"], c: 0 },
        { q: "19. 기계가 고장이 나면 직접 고치지 말고 기술자를 ____.", a: ["불러야 합니다", "부를 겁니다", "불렀습니다", "부르고 싶습니다"], c: 0 },
        { q: "20. 가: 사장님, 오늘 잔업이 있어요?\n나: 네, 제품을 오늘까지 다 ____ 해서 조금 더 일해야 해요.", a: ["보내야", "보러", "보내기로", "보내면서"], c: 0 }
    ];

    let currentQ = 0, answers = Array(20).fill(null), seconds = 1200;

    function display() {
        const d = examData[currentQ];
        document.getElementById('q-idx').innerText = `Q ${currentQ + 1} / 20`;
        document.getElementById('q-text').innerText = d.q;
        document.getElementById('opt-box').innerHTML = d.a.map((o, i) => `
            <div class="opt ${answers[currentQ] === i ? 'selected' : ''}" onclick="select(${i})">
                <div class="opt-idx">${i+1}</div>
                <div>${o}</div>
            </div>
        `).join('');
        document.getElementById('p-bar').style.width = `${(answers.filter(x => x !== null).length / 20) * 100}%`;
    }

    function select(i) { answers[currentQ] = i; display(); }
    function nav(dir) { if(currentQ + dir >= 0 && currentQ + dir < 20) { currentQ += dir; display(); } }

    const tick = setInterval(() => {
        seconds--;
        let m = Math.floor(seconds/60), s = seconds%60;
        document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
        if(seconds <= 0) submit();
    }, 1000);

    function submit() {
        if(!confirm("မေးခွန်းတွေအားလုံး ဖြေဆိုပြီးပြီလား Boss?")) return;
        clearInterval(tick);
        let score = answers.filter((a, i) => a === examData[i].c).length * 5;
        document.getElementById('final-score').innerText = score;
        document.getElementById('results').style.display = 'flex';
        document.getElementById('review-list').innerHTML = examData.map((d, i) => `
            <div class="review-card ${answers[i] === d.c ? 'correct' : 'wrong'}">
                <b>Question ${i+1}: ${answers[i] === d.c ? 'CORRECT' : 'WRONG'}</b><br>
                <small style="color:var(--accent)">Your Answer: ${answers[i] !== null ? d.a[answers[i]] : 'None'}</small><br>
                <small style="color:var(--gold)">Correct Answer: ${d.a[d.c]}</small>
            </div>
        `).join('');
    }

    display();
</script>
</body>
</html>
